<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイマー</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: #a0a0c0;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .timer-display {
      font-size: 6rem;
      font-weight: 200;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: #e0e0ff;
      margin-bottom: 0.5rem;
      transition: color 0.3s;
    }

    .timer-display.running {
      color: #7eb8f7;
    }

    .timer-display.finished {
      color: #f77eb8;
      animation: pulse 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .milliseconds {
      font-size: 2rem;
      color: #6060a0;
      margin-bottom: 3rem;
      font-variant-numeric: tabular-nums;
    }

    .input-section {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .time-input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .time-input-group label {
      font-size: 0.7rem;
      color: #6060a0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .time-input-group input {
      width: 4rem;
      background: #2a2a4e;
      border: 1px solid #3a3a6e;
      border-radius: 8px;
      color: #e0e0ff;
      font-size: 1.5rem;
      text-align: center;
      padding: 0.5rem;
      outline: none;
      transition: border-color 0.2s;
      font-variant-numeric: tabular-nums;
    }

    .time-input-group input:focus {
      border-color: #7eb8f7;
    }

    .time-input-group input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .colon {
      font-size: 1.5rem;
      color: #6060a0;
      margin-top: 1rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    button {
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      letter-spacing: 0.05em;
    }

    button:active {
      transform: scale(0.96);
    }

    #startBtn {
      background: #7eb8f7;
      color: #1a1a2e;
      min-width: 120px;
    }

    #startBtn.pause {
      background: #f7c77e;
    }

    #resetBtn {
      background: #2a2a4e;
      color: #a0a0c0;
      border: 1px solid #3a3a6e;
    }

    #resetBtn:hover {
      background: #3a3a5e;
    }

    .progress-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .ring-container {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 1rem;
    }

    .ring-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    svg.progress-ring {
      position: static;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: #2a2a4e;
      stroke-width: 4;
    }

    .ring-progress {
      fill: none;
      stroke: #7eb8f7;
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.1s linear, stroke 0.3s;
    }

    .ring-progress.finished {
      stroke: #f77eb8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Timer</h1>

    <div class="ring-container">
      <svg class="progress-ring" width="280" height="280">
        <circle class="ring-bg" cx="140" cy="140" r="130"/>
        <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="130"
          stroke-dasharray="816.8"
          stroke-dashoffset="0"/>
      </svg>
      <div class="ring-inner">
        <div class="timer-display" id="display">00:00</div>
        <div class="milliseconds" id="msDisplay">.00</div>
      </div>
    </div>

    <div class="input-section">
      <div class="time-input-group">
        <label>時間</label>
        <input type="number" id="hoursInput" min="0" max="99" value="0" placeholder="0">
      </div>
      <div class="colon">:</div>
      <div class="time-input-group">
        <label>分</label>
        <input type="number" id="minutesInput" min="0" max="59" value="0" placeholder="0">
      </div>
      <div class="colon">:</div>
      <div class="time-input-group">
        <label>秒</label>
        <input type="number" id="secondsInput" min="0" max="59" value="10" placeholder="0">
      </div>
    </div>

    <div class="buttons">
      <button id="resetBtn" onclick="reset()">リセット</button>
      <button id="startBtn" onclick="toggle()">スタート</button>
    </div>
  </div>

  <audio id="beep" preload="auto"></audio>

  <script>
    let totalMs = 0;
    let remainingMs = 0;
    let startTime = null;
    let rafId = null;
    let running = false;
    let finished = false;

    const display = document.getElementById('display');
    const msDisplay = document.getElementById('msDisplay');
    const startBtn = document.getElementById('startBtn');
    const ringProgress = document.getElementById('ringProgress');
    const CIRCUMFERENCE = 2 * Math.PI * 130;

    function getInputMs() {
      const h = parseInt(document.getElementById('hoursInput').value) || 0;
      const m = parseInt(document.getElementById('minutesInput').value) || 0;
      const s = parseInt(document.getElementById('secondsInput').value) || 0;
      return (h * 3600 + m * 60 + s) * 1000;
    }

    function formatTime(ms) {
      const totalSec = Math.ceil(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      if (h > 0) {
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      }
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function formatMs(ms) {
      return '.' + String(Math.floor((ms % 1000) / 10)).padStart(2,'0');
    }

    function updateRing(remaining, total) {
      if (total === 0) {
        ringProgress.style.strokeDashoffset = 0;
        return;
      }
      const ratio = remaining / total;
      const offset = CIRCUMFERENCE * (1 - ratio);
      ringProgress.style.strokeDashoffset = offset;
    }

    function tick() {
      const elapsed = Date.now() - startTime;
      remainingMs = Math.max(0, totalMs - elapsed);

      display.textContent = formatTime(remainingMs);
      msDisplay.textContent = formatMs(remainingMs);
      updateRing(remainingMs, totalMs);

      if (remainingMs <= 0) {
        display.textContent = '00:00';
        msDisplay.textContent = '.00';
        finish();
        return;
      }

      rafId = requestAnimationFrame(tick);
    }

    function finish() {
      running = false;
      finished = true;
      cancelAnimationFrame(rafId);
      display.classList.add('finished');
      ringProgress.classList.add('finished');
      startBtn.textContent = 'スタート';
      startBtn.classList.remove('pause');
      playBeep();
      setInputsDisabled(false);
    }

    function playBeep() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const times = [0, 0.3, 0.6, 0.9];
      times.forEach(t => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.25);
      });
    }

    function toggle() {
      if (finished) {
        reset();
        return;
      }
      if (!running) {
        const inputMs = getInputMs();
        if (inputMs === 0) return;
        if (remainingMs === 0) {
          totalMs = inputMs;
          remainingMs = totalMs;
        }
        startTime = Date.now() - (totalMs - remainingMs);
        running = true;
        startBtn.textContent = '一時停止';
        startBtn.classList.add('pause');
        setInputsDisabled(true);
        rafId = requestAnimationFrame(tick);
      } else {
        running = false;
        cancelAnimationFrame(rafId);
        startBtn.textContent = 'スタート';
        startBtn.classList.remove('pause');
      }
    }

    function reset() {
      cancelAnimationFrame(rafId);
      running = false;
      finished = false;
      remainingMs = 0;
      totalMs = 0;
      display.textContent = '00:00';
      msDisplay.textContent = '.00';
      display.classList.remove('finished');
      ringProgress.classList.remove('finished');
      ringProgress.style.strokeDashoffset = 0;
      startBtn.textContent = 'スタート';
      startBtn.classList.remove('pause');
      setInputsDisabled(false);
    }

    function setInputsDisabled(disabled) {
      document.getElementById('hoursInput').disabled = disabled;
      document.getElementById('minutesInput').disabled = disabled;
      document.getElementById('secondsInput').disabled = disabled;
    }

    // Clamp inputs on change
    ['hoursInput', 'minutesInput', 'secondsInput'].forEach(id => {
      document.getElementById(id).addEventListener('change', function() {
        const max = parseInt(this.max);
        const min = parseInt(this.min);
        if (this.value > max) this.value = max;
        if (this.value < min) this.value = min;
      });
    });
  </script>
</body>
</html>
